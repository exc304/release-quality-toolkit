<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="820" viewBox="0 0 1180 820" role="img" aria-labelledby="title desc">
  <title id="title">Go no-go decision matrix</title>
  <desc id="desc">A hand-drawn four-quadrant matrix comparing evidence strength and release risk to support ship, flag and ship, investigate, and defer decisions.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="4" dy="6" stdDeviation="0.9" flood-color="#111827" flood-opacity="0.22"/>
    </filter>
    <style>
      .paper { fill: #fffdf7; }
      .title { fill: #111827; font: 800 34px "Comic Sans MS", "Marker Felt", Arial, sans-serif; }
      .subtitle { fill: #374151; font: 18px "Comic Sans MS", "Marker Felt", Arial, sans-serif; }
      .quadTitle { fill: #111827; font: 800 30px "Comic Sans MS", "Marker Felt", Arial, sans-serif; }
      .text { fill: #111827; font: 19px "Comic Sans MS", "Marker Felt", Arial, sans-serif; }
      .small { fill: #374151; font: 16px "Comic Sans MS", "Marker Felt", Arial, sans-serif; }
      .axisLabel { fill: #111827; font: 800 24px "Comic Sans MS", "Marker Felt", Arial, sans-serif; }
      .ink { stroke: #111827; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thinInk { stroke: #111827; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke: #6b7280; stroke-width: 2; stroke-dasharray: 5 5; fill: none; }
      .ship { fill: #bbf7d0; }
      .flag { fill: #fde68a; }
      .investigate { fill: #dbeafe; }
      .defer { fill: #fecaca; }
      .note { fill: #fef08a; stroke: #111827; stroke-width: 2.4; }
    </style>
  </defs>

  <rect class="paper" width="1180" height="820" rx="28"/>
  <path class="dash" d="M26 24 H1154 V796 H26 Z" opacity="0.45"/>
  <text x="64" y="64" class="title">Go / No-Go Decision Matrix</text>
  <text x="66" y="96" class="subtitle">A release decision is a judgment call. This keeps the judgment visible.</text>

  <g transform="translate(190 150)" filter="url(#shadow)">
    <path class="investigate" d="M0 0 H390 V250 H0 Z"/>
    <path class="defer" d="M390 0 H780 V250 H390 Z"/>
    <path class="ship" d="M0 250 H390 V500 H0 Z"/>
    <path class="flag" d="M390 250 H780 V500 H390 Z"/>
    <path class="ink" d="M0 0 H780 V500 H0 Z"/>
    <path class="ink" d="M390 0 V500"/>
    <path class="ink" d="M0 250 H780"/>

    <text x="195" y="78" text-anchor="middle" class="quadTitle">Investigate</text>
    <text x="195" y="116" text-anchor="middle" class="text">low risk + weak evidence</text>
    <text x="195" y="148" text-anchor="middle" class="small">find the missing proof</text>

    <text x="585" y="78" text-anchor="middle" class="quadTitle">Defer</text>
    <text x="585" y="116" text-anchor="middle" class="text">high risk + weak evidence</text>
    <text x="585" y="148" text-anchor="middle" class="small">do not ship ambiguity</text>

    <text x="195" y="328" text-anchor="middle" class="quadTitle">Ship</text>
    <text x="195" y="366" text-anchor="middle" class="text">low risk + strong evidence</text>
    <text x="195" y="398" text-anchor="middle" class="small">proceed with monitoring</text>

    <text x="585" y="328" text-anchor="middle" class="quadTitle">Flag &amp; Ship</text>
    <text x="585" y="366" text-anchor="middle" class="text">high risk + strong evidence</text>
    <text x="585" y="398" text-anchor="middle" class="small">isolate the rollout</text>
  </g>

  <text x="580" y="710" text-anchor="middle" class="axisLabel">Evidence Strength</text>
  <text x="222" y="742" text-anchor="middle" class="small">weak</text>
  <text x="940" y="742" text-anchor="middle" class="small">strong</text>
  <g transform="translate(92 410) rotate(-90)">
    <text x="0" y="0" text-anchor="middle" class="axisLabel">Release Risk</text>
  </g>
  <text x="118" y="620" text-anchor="middle" class="small" transform="rotate(-90 118 620)">low</text>
  <text x="118" y="220" text-anchor="middle" class="small" transform="rotate(-90 118 220)">high</text>

  <g filter="url(#shadow)">
    <rect x="836" y="82" width="230" height="72" class="note" rx="8"/>
    <text x="951" y="113" class="small" text-anchor="middle">No square is automatic.</text>
    <text x="951" y="137" class="small" text-anchor="middle">Use context.</text>
  </g>
</svg>
