<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">Go no-go decision matrix</title>
  <desc id="desc">A four-quadrant matrix comparing release risk and evidence strength to support ship, flag, investigate, and defer decisions.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .axis { stroke: #334155; stroke-width: 4; }
      .label { fill: #0f172a; font: 700 24px Arial, sans-serif; }
      .small { fill: #475569; font: 17px Arial, sans-serif; }
      .quadTitle { fill: #0f172a; font: 700 30px Arial, sans-serif; }
      .quadText { fill: #334155; font: 18px Arial, sans-serif; }
      .ship { fill: #dcfce7; }
      .flag { fill: #fef3c7; }
      .investigate { fill: #e0f2fe; }
      .defer { fill: #fee2e2; }
    </style>
  </defs>
  <rect class="bg" width="1100" height="760" rx="24"/>
  <text x="60" y="58" class="label" style="font-size:32px">Go / No-Go Decision Matrix</text>
  <text x="60" y="90" class="small">Use evidence strength and release risk together. Neither axis is enough alone.</text>

  <g transform="translate(190 145)">
    <rect x="0" y="0" width="400" height="240" class="investigate"/>
    <rect x="400" y="0" width="400" height="240" class="defer"/>
    <rect x="0" y="240" width="400" height="240" class="ship"/>
    <rect x="400" y="240" width="400" height="240" class="flag"/>
    <line x1="400" y1="0" x2="400" y2="480" class="axis"/>
    <line x1="0" y1="240" x2="800" y2="240" class="axis"/>
    <rect x="0" y="0" width="800" height="480" fill="none" stroke="#334155" stroke-width="4"/>

    <text x="200" y="70" text-anchor="middle" class="quadTitle">Investigate</text>
    <text x="200" y="108" text-anchor="middle" class="quadText">Low risk, weak evidence</text>
    <text x="200" y="140" text-anchor="middle" class="quadText">Find the missing proof.</text>

    <text x="600" y="70" text-anchor="middle" class="quadTitle">Defer</text>
    <text x="600" y="108" text-anchor="middle" class="quadText">High risk, weak evidence</text>
    <text x="600" y="140" text-anchor="middle" class="quadText">Do not ship ambiguity.</text>

    <text x="200" y="310" text-anchor="middle" class="quadTitle">Ship</text>
    <text x="200" y="348" text-anchor="middle" class="quadText">Low risk, strong evidence</text>
    <text x="200" y="380" text-anchor="middle" class="quadText">Proceed with monitoring.</text>

    <text x="600" y="310" text-anchor="middle" class="quadTitle">Flag &amp; Ship</text>
    <text x="600" y="348" text-anchor="middle" class="quadText">High risk, strong evidence</text>
    <text x="600" y="380" text-anchor="middle" class="quadText">Isolate and control rollout.</text>
  </g>

  <text x="590" y="685" text-anchor="middle" class="label">Evidence Strength</text>
  <text x="230" y="720" text-anchor="middle" class="small">Weak</text>
  <text x="950" y="720" text-anchor="middle" class="small">Strong</text>
  <g transform="translate(78 390) rotate(-90)">
    <text x="0" y="0" text-anchor="middle" class="label">Release Risk</text>
  </g>
  <text x="92" y="625" text-anchor="middle" class="small" transform="rotate(-90 92 625)">Low</text>
  <text x="92" y="220" text-anchor="middle" class="small" transform="rotate(-90 92 220)">High</text>
</svg>

